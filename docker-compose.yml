name: scriptsea

# =============================================================================
# Network topology
# -----------------------------------------------------------------------------
#  grpc_net  — Internal only. gRPC services + gateway. Never exposed to host.
#  db_net    — Internal only. Databases + their owning service.
#  app_net   — External-facing. Gateway (HTTP) + Frontend (HTTP).
# =============================================================================

services:

  # ===========================================================================
  # Infrastructure — Databases & Cache
  # ===========================================================================

  postgres-user:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${USER_DB_USER:-user}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD:-1234}
      POSTGRES_DB:       ${USER_DB_NAME:-user_service_db}
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    networks:
      - db_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_DB_USER:-user} -d ${USER_DB_NAME:-user_service_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-wallet:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${WALLET_DB_USER:-wallet}
      POSTGRES_PASSWORD: ${WALLET_DB_PASSWORD:-1234}
      POSTGRES_DB:       ${WALLET_DB_NAME:-wallet_db}
    volumes:
      - postgres_wallet_data:/var/lib/postgresql/data
    networks:
      - db_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WALLET_DB_USER:-wallet} -d ${WALLET_DB_NAME:-wallet_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-expense:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${EXPENSE_DB_USER:-expense}
      POSTGRES_PASSWORD: ${EXPENSE_DB_PASSWORD:-1234}
      POSTGRES_DB:       ${EXPENSE_DB_NAME:-expense_service}
    volumes:
      - postgres_expense_data:/var/lib/postgresql/data
    networks:
      - db_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${EXPENSE_DB_USER:-expense} -d ${EXPENSE_DB_NAME:-expense_service}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-llm:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${LLM_DB_USER:-user}
      POSTGRES_PASSWORD: ${LLM_DB_PASSWORD:-password}
      POSTGRES_DB:       ${LLM_DB_NAME:-llm_job_db}
    volumes:
      - postgres_llm_data:/var/lib/postgresql/data
    networks:
      - db_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LLM_DB_USER:-user} -d ${LLM_DB_NAME:-llm_job_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-1234}
    volumes:
      - redis_data:/data
    networks:
      - db_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-1234}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # gRPC Microservices — only on grpc_net (+ db_net where needed)
  # NO host-port mappings here; the API gateway is the only entry point.
  # ===========================================================================

  user_service:
    build:
      context: ./backend/services/user_service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SERVER_PORT:  ${USER_SERVICE_PORT:-3000}
      DBHOST:       postgres-user
      DBUSER:       ${USER_DB_USER:-user}
      DBPASSWORD:   ${USER_DB_PASSWORD:-1234}
      DBNAME:       ${USER_DB_NAME:-user_service_db}
      DBPORT:       5432
      DBSSLMODE:    disable
      DBTIMEZONE:   Asia/Jakarta
    depends_on:
      postgres-user:
        condition: service_healthy
    networks:
      - grpc_net
      - db_net

  wallet_service:
    build:
      context: ./backend/services/wallet_service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      WALLET_SERVICE_PORT: ${WALLET_SERVICE_PORT:-50051}
      DBHOST:              postgres-wallet
      DBUSER:              ${WALLET_DB_USER:-wallet}
      DBPASSWORD:          ${WALLET_DB_PASSWORD:-1234}
      DBNAME:              ${WALLET_DB_NAME:-wallet_db}
      DBPORT:              5432
      DBSSLMODE:           disable
      DBTIMEZONE:          UTC
      REDIS_HOST:          redis
      REDIS_PORT:          6379
      REDIS_PASSWORD:      ${REDIS_PASSWORD:-1234}
    depends_on:
      postgres-wallet:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - grpc_net
      - db_net

  expense_service:
    build:
      context: ./backend/services/expense_service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      EXPENSE_SERVICE_PORT: ${EXPENSE_SERVICE_PORT:-50053}
      WALLET_SERVICE_ADDR:  "wallet_service:${WALLET_SERVICE_PORT:-50051}"
      DBHOST:               postgres-expense
      DBUSER:               ${EXPENSE_DB_USER:-expense}
      DBPASSWORD:           ${EXPENSE_DB_PASSWORD:-1234}
      DBNAME:               ${EXPENSE_DB_NAME:-expense_service}
      DBPORT:               5432
      DBSSLMODE:            disable
      DBTIMEZONE:           UTC
    depends_on:
      postgres-expense:
        condition: service_healthy
      wallet_service:
        condition: service_started
    networks:
      - grpc_net
      - db_net

  llm_job_service:
    build:
      context: ./backend/services/llm_job_service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      LLM_SERVICE_PORT:         ${LLM_SERVICE_PORT:-50057}
      GEMINI_API_KEY:           ${GEMINI_API_KEY}
      OPEN_ROUTER_API_KEY:      ${OPEN_ROUTER_API_KEY}
      ACCESS_KEY:               ${LLM_ACCESS_KEY:-YES}
      EXPENSE_SERVICE_ENDPOINT: "expense_service:${EXPENSE_SERVICE_PORT:-50053}"
      DBHOST:                   postgres-llm
      DBUSER:                   ${LLM_DB_USER:-user}
      DBPASSWORD:               ${LLM_DB_PASSWORD:-password}
      DBNAME:                   ${LLM_DB_NAME:-llm_job_db}
      DBPORT:                   5432
      DBSSLMODE:                ${LLM_DB_SSLMODE:-disable}
      DBTIMEZONE:               ${LLM_DB_TIMEZONE:-UTC}
    depends_on:
      postgres-llm:
        condition: service_healthy
      expense_service:
        condition: service_started
    networks:
      - grpc_net
      - db_net
      - app_net

  report_service:
    build:
      context: ./backend/services/report_service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SERVICE_PORT:         ${REPORT_SERVICE_PORT:-3030}
      EXPENSE_SERVICE_PORT: ${EXPENSE_SERVICE_PORT:-50053}
      EXPENSE_SERVICE_HOST: expense_service
      USER_SERVICE_PORT:    ${USER_SERVICE_PORT:-3000}
      USER_SERVICE_HOST:    user_service
      STORAGE_ENDPOINT:     ${STORAGE_ENDPOINT}
      STORAGE_REGION:       ${STORAGE_REGION}
      STORAGE_ACCESS_KEY:   ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY:   ${STORAGE_SECRET_KEY}
      STORAGE_BUCKET:       ${STORAGE_BUCKET}
      WALLET_SERVICE_TOKEN: ${WALLET_SERVICE_TOKEN}
    depends_on:
      - expense_service
      - user_service
    networks:
      - grpc_net
      - app_net

  # ===========================================================================
  # API Gateway — bridges gRPC services and the outside world (HTTP)
  # ===========================================================================

  api_gateway:
    build:
      context: ./backend/gateway/api-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT:                  ":${GATEWAY_PORT:-8080}"
      WALLET_SERVICE_ADDR:   "wallet_service:${WALLET_SERVICE_PORT:-50051}"
      EXPENSE_SERVICE_ADDR:  "expense_service:${EXPENSE_SERVICE_PORT:-50053}"
      USER_SERVICE_ADDR:     "user_service:${USER_SERVICE_PORT:-3000}"
      LLM_JOB_SERVICE_ADDR:  "llm_job_service:${LLM_SERVICE_PORT:-50057}"
      REPORT_SERVICE_ADDR:   "report_service:${REPORT_SERVICE_PORT:-3030}"
      JWT_SECRET_KEY:        "${BETTER_AUTH_SECRET}"
    ports:
      - "${GATEWAY_HOST_PORT:-8080}:${GATEWAY_PORT:-8080}"
    depends_on:
      - user_service
      - wallet_service
      - expense_service
      - llm_job_service
      - report_service
    networks:
      - grpc_net   # can reach all gRPC services
      - app_net    # reachable by the frontend

  # ===========================================================================
  # Frontend — Next.js web app
  # ===========================================================================

  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_GATEWAY_URL=${NEXT_PUBLIC_API_GATEWAY_URL:-http://localhost:8080}
    restart: unless-stopped
    environment:
      # Server-side URL (container-to-container inside app_net)
      API_GATEWAY_URL:             "http://api_gateway:${GATEWAY_PORT:-8080}"
      NEXT_PUBLIC_API_GATEWAY_URL: "http://api_gateway:${GATEWAY_PORT:-8080}"
      JWT_SECRET_KEY:              ${JWT_SECRET_KEY:-secret}
      BETTER_AUTH_SECRET:          ${BETTER_AUTH_SECRET:-auth-secret}
      BETTER_AUTH_URL:             ${BETTER_AUTH_URL:-http://localhost:3000}
      GOOGLE_CLIENT_ID:            ${GOOGLE_CLIENT_ID:-google-client-id}
      GOOGLE_CLIENT_SECRET:        ${GOOGLE_CLIENT_SECRET:-google-client-secret}
      RESEND_API_KEY:              ${RESEND_API_KEY}
      INVITATION_CODE:             ${INVITATION_CODE:-GRUPER2026}
      DATABASE_URL:                "postgresql://${USER_DB_USER:-user}:${USER_DB_PASSWORD:-1234}@postgres-user:5432/${USER_DB_NAME:-user_service_db}"
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    depends_on:
      - api_gateway
      - postgres-user
    networks:
      - app_net
      - db_net

# =============================================================================
# Volumes & Networks
# =============================================================================

volumes:
  postgres_user_data:
  postgres_wallet_data:
  postgres_expense_data:
  postgres_llm_data:
  redis_data:

networks:
  # gRPC services are isolated on this network — no host exposure
  grpc_net:
    driver: bridge
    internal: true   # ← blocks all outbound internet from gRPC containers

  # Database network is fully internal
  db_net:
    driver: bridge
    internal: true

  # App-facing network (gateway + frontend) — has internet access
  app_net:
    driver: bridge
