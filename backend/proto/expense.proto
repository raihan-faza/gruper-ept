syntax = "proto3";

option go_package = "github.com/raihan-faza/scriptsea-ept/backend/services/expense_service/pb";

package expense;

import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

service ExpenseService {
  rpc CreateExpense (CreateExpenseRequest) returns (CreateExpenseResponse) {}
  rpc UpdateExpense (UpdateExpenseRequest) returns (UpdateExpenseResponse) {}
  rpc DeleteExpense (DeleteExpenseRequest) returns (google.protobuf.Empty) {}
  rpc GetAllExpenses (GetAllExpensesRequest) returns (GetAllExpensesResponse) {}
  rpc CreateExpenseCategory (CreateExpenseCategoryRequest) returns (CreateExpenseCategoryResponse) {}
  rpc UpdateExpenseCategory (UpdateExpenseCategoryRequest) returns (UpdateExpenseCategoryResponse) {}
  rpc DeleteExpenseCategory (DeleteExpenseCategoryRequest) returns (google.protobuf.Empty) {}
  rpc GetAllExpensesCategory (GetAllExpensesCategoryRequest) returns (GetAllExpensesCategoryResponse) {}
}

message ExpenseCategory {
  uint64 id = 1;
  string user_id = 2;
  string name = 3;
  string description = 4;

  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message ExpenseItem {
  string item_name = 1;
  int64 item_quantity = 2;
  int64 total_price = 3;
}

message Expense {
  string id = 1;
  string user_id = 2;
  string wallet_id = 3;
  uint64 category_id = 4;
  string expense_name = 5;
  string expense_details = 6;
  repeated ExpenseItem expense_items = 7;
  int64 amount = 8;
  string status = 9;
  string date = 10;
  string idempotency_key = 11;

  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

message CreateExpenseRequest {
 Expense expense = 1; 
}

message UpdateExpenseRequest {
  Expense expense = 1;
  google.protobuf.FieldMask update_mask = 2; 
}

message DeleteExpenseRequest {
  string expense_id = 1;
  string user_id = 2;
  string wallet_id = 3;
}

message CreateExpenseCategoryRequest{
  ExpenseCategory expense_category = 1;
}

message UpdateExpenseCategoryRequest{
  ExpenseCategory expense_category = 1; 
  google.protobuf.FieldMask update_mask = 2; 
}

message DeleteExpenseCategoryRequest{
 uint64  id = 1;
 string user_id = 2;
}

message GetAllExpensesRequest {
  string user_id = 1;
  string wallet_id = 2;
}

message GetAllExpensesCategoryRequest {
  string user_id = 1;
}

message CreateExpenseResponse {
  Expense expense = 1;
}

message UpdateExpenseResponse {
  Expense expense = 1;
}

message CreateExpenseCategoryResponse {
  ExpenseCategory  expense_category = 1;
}

message UpdateExpenseCategoryResponse {
  ExpenseCategory  expense_category = 1;
}

message GetAllExpensesResponse {
  repeated Expense expenses = 1;
}

message  GetAllExpensesCategoryResponse{
  repeated ExpenseCategory expense_categories = 1;
}
